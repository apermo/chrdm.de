name: Deploy

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, zip
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist

      - name: Build sovereignty theme assets
        uses: apermo/sovereignty/.github/actions/build@v1.4.2
        with:
          working-directory: web/app/themes/sovereignty

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build
          # Hidden files are excluded by default since upload-artifact v4.4;
          # we need them so web/.well-known/ (security.txt etc.) gets deployed.
          include-hidden-files: true
          path: |
            .
            !.git
            !.github
          retention-days: 1

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build
          path: build

      - name: Unlock files for sync
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -eu
            cd ${{ secrets.DEPLOY_PATH }}
            # The previous deploy locked directories to 555; re-add owner write
            # so rsync can create, replace and delete entries. uploads/ is
            # already writable and stays untouched.
            find . -path ./web/app/uploads -prune -o -type d -exec chmod u+w {} +

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@8.0.5
        with:
          switches: -avzr --delay-updates --delete-delay --chmod=D755,F644 --exclude='.env' --exclude='web/app/uploads/' --exclude='web/.htaccess'
          path: build/
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}
          remote_port: ${{ secrets.DEPLOY_PORT }}

      - name: Lock down file permissions
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -eu
            cd ${{ secrets.DEPLOY_PATH }}
            if [ -d "web/app/cache" ]; then
              rm -rf web/app/cache/*
            fi
            # Make the deployed code tree read-only. Nothing but uploads/ needs
            # runtime writes (DISALLOW_FILE_EDIT/MODS are set), so this blocks
            # the common case of a compromised plugin dropping a webshell.
            # uploads/ and .env are pruned so they keep their own permissions.
            # web/.htaccess is rsync-excluded but still locked to 444 here on
            # purpose (it falls under the find); runtime permalink rewrites need
            # a manual unlock — see the trade-off in .gemini/styleguide.md.
            # When adding file-based object/page caching, whitelist the cache
            # dir here the same way uploads/ is handled — see issue #33.
            find . -path ./web/app/uploads -prune -o -name .env -prune -o -type d -exec chmod 555 {} +
            find . -path ./web/app/uploads -prune -o -name .env -prune -o -type f -exec chmod 444 {} +
            if [ -f ".env" ]; then
              chmod 600 .env
            fi

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: deploy
    # Only meaningful for tag deploys; workflow_dispatch on a branch is skipped.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Full history + tags so the annotated tag message is available
          # to reuse as the release body.
          fetch-depth: 0

      - name: Create release if it does not exist yet
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Idempotent: a tag may be pushed that already has a release (e.g.
          # created together via `gh release create`). Skip quietly so the
          # deploy is never broken by a duplicate-release error.
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — skipping."
            exit 0
          fi
          # Prefer the annotated tag's own message as the release notes;
          # fall back to auto-generated notes for lightweight tags.
          notes="$(git for-each-ref "refs/tags/$tag" --format='%(contents)')"
          if [ -n "${notes//[[:space:]]/}" ]; then
            printf '%s\n' "$notes" > "$RUNNER_TEMP/notes.md"
            gh release create "$tag" --title "$tag" --notes-file "$RUNNER_TEMP/notes.md"
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi
          echo "Created release $tag."
