name: Deploy

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, zip
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist

      - name: Build sovereignty theme assets
        uses: apermo/sovereignty/.github/actions/build@v2.0.1
        with:
          working-directory: web/app/themes/sovereignty

      - name: Determine release version
        id: version
        run: |
          set -eu
          # Tag deploys use the tag (e.g. v1.7.0); manual dispatches fall back
          # to the short SHA. The VERSION file ships in the artifact so the
          # running app tags Sentry events with the same string the
          # sentry-release job reports.
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version="$GITHUB_REF_NAME"
          else
            version="$(git rev-parse --short HEAD)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$version" > VERSION

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build
          # Hidden files are excluded by default since upload-artifact v4.4;
          # we need them so web/.well-known/ (security.txt etc.) gets deployed.
          include-hidden-files: true
          path: |
            .
            !.git
            !.github
          retention-days: 1

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build
          path: build

      - name: Unlock files for sync
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -eu
            cd ${{ secrets.DEPLOY_PATH }}
            # The previous deploy locked directories to 555; re-add owner write
            # so rsync can create, replace and delete entries. uploads/ is
            # already writable and stays untouched.
            find . -path ./web/app/uploads -prune -o -type d -exec chmod u+w {} +

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@8.0.5
        with:
          switches: -avzr --delay-updates --delete-delay --chmod=D755,F644 --exclude='.env' --exclude='web/app/uploads/' --exclude='web/app/cache/' --exclude='web/.htaccess'
          path: build/
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}
          remote_port: ${{ secrets.DEPLOY_PORT }}

      - name: Lock down file permissions
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -eu
            cd ${{ secrets.DEPLOY_PATH }}
            # Cachify HDD method writes static page cache to web/app/cache. The
            # dir is rsync-excluded so it survives deploys, but rsync does not
            # invalidate it, so clear stale entries here. Ensure it exists so
            # the cache-dir prune below has a target on a fresh server.
            mkdir -p web/app/cache
            rm -rf web/app/cache/*
            # performant-translations loads a compiled .l10n.php in preference
            # to the .mo. A stale .l10n.php from a previous build survives the
            # deploy and shadows the freshly downloaded translations, so the
            # site keeps serving outdated strings. Rebuild the caches from the
            # deployed .po files now, while the tree is still writable; they get
            # locked read-only below, so perf-trans serves them without ever
            # regenerating at runtime on the read-only tree.
            if command -v wp >/dev/null 2>&1 && [ -d "web/app/languages" ]; then
              find web/app/languages -name '*.l10n.php' -delete
              for d in web/app/languages web/app/languages/themes web/app/languages/plugins; do
                [ -d "$d" ] && wp i18n make-php "$d" || true
              done
            fi
            # Make the deployed code tree read-only. Nothing but uploads/ needs
            # runtime writes (DISALLOW_FILE_EDIT/MODS are set), so this blocks
            # the common case of a compromised plugin dropping a webshell.
            # uploads/ and .env are pruned so they keep their own permissions.
            # web/.htaccess is rsync-excluded but still locked to 444 here on
            # purpose (it falls under the find); runtime permalink rewrites need
            # a manual unlock — see the trade-off in .gemini/styleguide.md.
            # web/app/cache holds the Cachify HDD page cache and must stay
            # owner-writable at runtime, so it is pruned like uploads/ (#33).
            find . -path ./web/app/uploads -prune -o -path ./web/app/cache -prune -o -name .env -prune -o -type d -exec chmod 555 {} +
            find . -path ./web/app/uploads -prune -o -path ./web/app/cache -prune -o -name .env -prune -o -type f -exec chmod 444 {} +
            # AutoSSL/Let's Encrypt renews certs via HTTP DCV by creating
            # web/.well-known/acme-challenge and dropping a token there. The
            # read-only hardening above locks .well-known to 555, so the write
            # fails and every domain's cert silently stops renewing. Re-open
            # just this one directory to 755 (owner-writable); security.txt
            # inside it stays 444 from the find above.
            chmod 755 web/.well-known
            if [ -f ".env" ]; then
              chmod 600 .env
            fi

      - name: Purge Cachify cache
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -eu
            cd ${{ secrets.DEPLOY_PATH }}
            # rsync updates files but does not invalidate the page cache, so
            # anonymous visitors keep getting pre-deploy pages until purged.
            # Flush every site in the network; a single site failing must not
            # fail the deploy. wp-cli.yml already pins --path to web/wp.
            for url in $(wp site list --field=url); do
              wp cachify flush --all-methods --url="$url" || true
            done

  sentry-release:
    name: Create Sentry Release
    runs-on: ubuntu-latest
    needs: [build, deploy]
    # Only tag deploys are real releases; workflow_dispatch on a branch is skipped.
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Full history so set_commits can associate this release's commits.
          fetch-depth: 0

      - name: Create Sentry release and production deploy
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: christoph-daum
          SENTRY_PROJECT: chrdmde
          # EU data region — without this sentry-cli defaults to the US host.
          SENTRY_URL: https://de.sentry.io
        with:
          environment: production
          version: ${{ needs.build.outputs.version }}
          set_commits: auto

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: deploy
    # Only meaningful for tag deploys; workflow_dispatch on a branch is skipped.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Full history + tags so the annotated tag message is available
          # to reuse as the release body.
          fetch-depth: 0

      - name: Create release if it does not exist yet
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Idempotent: a tag may be pushed that already has a release (e.g.
          # created together via `gh release create`). Skip quietly so the
          # deploy is never broken by a duplicate-release error.
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — skipping."
            exit 0
          fi
          # Prefer the annotated tag's own message as the release notes;
          # fall back to auto-generated notes for lightweight tags.
          notes="$(git for-each-ref "refs/tags/$tag" --format='%(contents)')"
          if [ -n "${notes//[[:space:]]/}" ]; then
            printf '%s\n' "$notes" > "$RUNNER_TEMP/notes.md"
            gh release create "$tag" --title "$tag" --notes-file "$RUNNER_TEMP/notes.md"
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi
          echo "Created release $tag."
